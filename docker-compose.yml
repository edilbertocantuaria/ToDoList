services:
  db:
    image: postgres:16-alpine
    container_name: todo-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DEVELOPMENT_DATABASE:-to_do_list_development}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: todo-api
    restart: unless-stopped
    depends_on:
      - db
    environment:
      RAILS_ENV: development
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: db
      DB_PORT: ${DB_PORT:-5432}
      DEVELOPMENT_DATABASE: ${DEVELOPMENT_DATABASE:-to_do_list_development}
      TEST_DATABASE: ${TEST_DATABASE:-to_do_list_test}
    ports:
      - "3000:3000"
    volumes:
      - ./api:/app
    command: >
      bash -lc "rm -f /app/tmp/pids/server.pid &&
      bundle exec rails db:prepare &&
      bundle exec rails server -b 0.0.0.0 -p 3000"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: todo-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WDS_SOCKET_PORT: "0"
      PORT: 3001
      REACT_APP_API_URL: http://localhost:3000
    ports:
      - "3001:3001"
    volumes:
      - ./web:/app
      - /app/node_modules
    command: npm start

volumes:
  postgres_data:
